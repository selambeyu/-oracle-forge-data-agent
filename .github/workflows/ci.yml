name: CI

on:
  push:
    branches:
      - main
      - feat/agent
  pull_request:
    branches:
      - main
      - feat/agent


jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run tests
        run: uv run pytest
        env:
          PYTHONPATH: .
          OPENROUTER_API_KEY: "test-key-for-ci"
